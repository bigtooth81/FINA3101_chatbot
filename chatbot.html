<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FINA 3101 Tutor — Essentials of Investments</title>
<style>
  :root {
    --blue:    #003DA5;   /* GWU colonial blue */
    --gold:    #FFBE00;   /* GWU buff/gold */
    --bg:      #F4F6FB;
    --white:   #FFFFFF;
    --border:  #DDE2F0;
    --text:    #1A1A2E;
    --muted:   #6B7280;
    --user-bg: #003DA5;
    --bot-bg:  #FFFFFF;
    --radius:  12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    background: var(--blue);
    color: var(--white);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
  }
  header .logo {
    width: 40px; height: 40px;
    background: var(--gold);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 18px; color: var(--blue);
  }
  header h1 { font-size: 16px; font-weight: 700; line-height: 1.2; }
  header p  { font-size: 12px; opacity: .8; }

  /* ── Status bar ── */
  #status-bar {
    background: var(--gold);
    padding: 6px 16px;
    font-size: 12px;
    font-weight: 600;
    color: var(--blue);
    flex-shrink: 0;
    text-align: center;
  }

  /* ── Suggested questions ── */
  #suggestions {
    padding: 10px 16px 4px;
    display: flex; flex-wrap: wrap; gap: 8px;
    flex-shrink: 0;
  }
  .suggestion-btn {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    cursor: pointer;
    color: var(--blue);
    transition: background .15s, border-color .15s;
  }
  .suggestion-btn:hover {
    background: var(--blue);
    color: var(--white);
    border-color: var(--blue);
  }

  /* ── Chat window ── */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .bubble-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }
  .bubble-row.user  { justify-content: flex-end; }
  .bubble-row.bot   { justify-content: flex-start; }

  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }
  .bot  .avatar { background: var(--blue); color: var(--white); }
  .user .avatar { background: var(--gold); color: var(--blue); font-weight: 700; }

  .bubble {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .bot  .bubble {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 2px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .user .bubble {
    background: var(--user-bg);
    color: var(--white);
    border-bottom-right-radius: 2px;
  }

  .typing-indicator span {
    display: inline-block;
    width: 7px; height: 7px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
    margin: 0 2px;
  }
  .typing-indicator span:nth-child(2) { animation-delay: .2s; }
  .typing-indicator span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); }
    40%          { transform: translateY(-6px); }
  }

  /* source citations */
  .source {
    display: block;
    margin-top: 8px;
    font-size: 11px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    padding-top: 6px;
  }

  /* ── Input area ── */
  #input-area {
    background: var(--white);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  #user-input {
    flex: 1;
    resize: none;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    line-height: 1.5;
    max-height: 120px;
    overflow-y: auto;
    outline: none;
    transition: border-color .2s;
  }
  #user-input:focus { border-color: var(--blue); }
  #send-btn {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--blue);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
    flex-shrink: 0;
  }
  #send-btn:hover:not(:disabled) { background: #002880; }
  #send-btn:disabled { background: var(--border); cursor: not-allowed; }
  #send-btn svg { fill: var(--white); }

  /* ── Scrollbar ── */
  #chat::-webkit-scrollbar { width: 5px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">GW</div>
  <div>
    <h1>FINA 3101 — Investment Tutor</h1>
  </div>
</header>

<div id="status-bar">📚 FINA 3101 Investment Tutor — powered by AI</div>

<div id="suggestions">
  <button class="suggestion-btn" onclick="askSuggestion(this)">What is the risk-return tradeoff?</button>
  <button class="suggestion-btn" onclick="askSuggestion(this)">Explain the Capital Asset Pricing Model</button>
  <button class="suggestion-btn" onclick="askSuggestion(this)">What is portfolio diversification?</button>
  <button class="suggestion-btn" onclick="askSuggestion(this)">How are bond prices and yields related?</button>
  <button class="suggestion-btn" onclick="askSuggestion(this)">What is the Efficient Market Hypothesis?</button>
  <button class="suggestion-btn" onclick="askSuggestion(this)">Explain beta and systematic risk</button>
</div>

<div id="chat"></div>

<div id="input-area">
  <textarea id="user-input" rows="1" placeholder="Ask a question about investments…"
    onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button id="send-btn" onclick="sendMessage()" title="Send">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24">
      <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
    </svg>
  </button>
</div>

<script>
// ── Configuration ──────────────────────────────────────────────────────────
// Replace this URL with your Cloudflare Worker URL after deploying worker.js
const PROXY_URL          = "https://fina3101-tutor.davidkog2022.workers.dev/v1/chat/completions";
const MODEL              = "meta/llama-3.3-70b-instruct";
const MAX_CONTEXT_CHUNKS = 6;

// ── State ──────────────────────────────────────────────────────────────────
let chunks   = [];   // loaded from textbook_chunks.json
let messages = [];   // full conversation history

// ── Boot ───────────────────────────────────────────────────────────────────
(async function init() {
  await loadChunks();
  addBotMessage(
    "Hello! I'm your FINA 3101 tutor.\n\n" +
    "Ask me anything — concepts, formulas, practice problems, or exam prep. " +
    "I'll answer using the textbook content.\n\n" +
    (chunks.length === 0
      ? "⚠️ Textbook index not loaded — answers will rely on general knowledge only. " +
        "Run `process_pdf.py` and place `textbook_chunks.json` in the same folder as this file."
      : `📚 Textbook index loaded (${chunks.length} sections).`)
  );
})();

// ── Load textbook chunks ────────────────────────────────────────────────────
async function loadChunks() {
  try {
    const res = await fetch("textbook_chunks.json");
    if (!res.ok) return;
    chunks = await res.json();
  } catch (_) {
    // file not present — chatbot still works via general knowledge
  }
}

// ── Simple TF-IDF keyword search ────────────────────────────────────────────
function searchChunks(query, k = MAX_CONTEXT_CHUNKS) {
  if (!chunks.length) return [];
  const terms = query.toLowerCase().split(/\W+/).filter(w => w.length > 2);
  const scored = chunks.map(c => {
    const text = c.text.toLowerCase();
    const score = terms.reduce((s, t) => {
      const re = new RegExp(`\\b${t}`, 'g');
      return s + (text.match(re) || []).length;
    }, 0);
    return { score, text: c.text };
  });
  scored.sort((a, b) => b.score - a.score);
  return scored.slice(0, k).filter(c => c.score > 0).map(c => c.text);
}

// ── Build system prompt ─────────────────────────────────────────────────────
function buildSystem(contextChunks) {
  let sys =
    "You are an expert tutor for FINA 3101 (Investments & Portfolio Management) at " +
    "George Washington University. The course textbook is *Essentials of Investments* " +
    "by Bodie, Kane & Marcus (9th edition, McGraw-Hill).\n\n" +
    "Guidelines:\n" +
    "• Answer clearly and at a level appropriate for undergraduate finance students.\n" +
    "• When relevant, cite the textbook chapter or section.\n" +
    "• For formulas, explain each variable.\n" +
    "• If the student seems confused, offer a simple numerical example.\n" +
    "• Be encouraging and pedagogical — guide them to understand, don't just give answers.\n" +
    "• If a question is outside the scope of the course, say so politely.\n";

  if (contextChunks.length > 0) {
    sys += "\n---\nRelevant textbook excerpts (use these to ground your answer):\n\n";
    contextChunks.forEach((c, i) => {
      sys += `[Excerpt ${i + 1}]\n${c}\n\n`;
    });
    sys += "---\n";
  }
  return sys;
}

// ── Chat ─────────────────────────────────────────────────────────────────────
async function sendMessage() {
  const textarea = document.getElementById("user-input");
  const text = textarea.value.trim();
  if (!text) return;
  textarea.value = "";
  autoResize(textarea);

  addUserMessage(text);
  const typingId = addTyping();
  disableSend(true);

  // Find relevant textbook chunks
  const context = searchChunks(text);

  // Build the API messages array
  const systemMsg = buildSystem(context);
  const apiMessages = [
    { role: "system", content: systemMsg },
    ...messages.map(m => ({ role: m.role, content: m.content })),
  ];

  // Store user message
  messages.push({ role: "user", content: text });

  try {
    const response = await fetch(PROXY_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: MODEL,
        messages: apiMessages,
        temperature: 0.4,
        max_tokens: 1024,
        stream: false,
      }),
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      const msg = err?.detail || err?.message || `HTTP ${response.status}`;
      removeTyping(typingId);
      addBotMessage(`❌ API error: ${msg}`);
      messages.pop(); // remove failed user message
    } else {
      const data = await response.json();
      const reply = data.choices?.[0]?.message?.content || "(no response)";
      removeTyping(typingId);
      const sourceNote = context.length > 0
        ? `\n\n[Sources: ${context.length} textbook section(s) used]`
        : "";
      addBotMessage(reply + sourceNote);
      messages.push({ role: "assistant", content: reply });
    }
  } catch (e) {
    removeTyping(typingId);
    addBotMessage(`❌ Network error: ${e.message}`);
    messages.pop();
  }

  disableSend(false);
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function addUserMessage(text) {
  const row = document.createElement("div");
  row.className = "bubble-row user";
  row.innerHTML = `
    <div class="bubble">${escHtml(text)}</div>
    <div class="avatar">You</div>`;
  document.getElementById("chat").appendChild(row);
  scrollBottom();
}

function addBotMessage(text) {
  const row = document.createElement("div");
  row.className = "bubble-row bot";
  row.innerHTML = `
    <div class="avatar">📘</div>
    <div class="bubble">${formatBot(text)}</div>`;
  document.getElementById("chat").appendChild(row);
  scrollBottom();
}

function addTyping() {
  const id = "typing-" + Date.now();
  const row = document.createElement("div");
  row.className = "bubble-row bot";
  row.id = id;
  row.innerHTML = `
    <div class="avatar">📘</div>
    <div class="bubble typing-indicator">
      <span></span><span></span><span></span>
    </div>`;
  document.getElementById("chat").appendChild(row);
  scrollBottom();
  return id;
}

function removeTyping(id) {
  document.getElementById(id)?.remove();
}

function disableSend(val) {
  document.getElementById("send-btn").disabled = val;
}

function scrollBottom() {
  const c = document.getElementById("chat");
  c.scrollTop = c.scrollHeight;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatBot(text) {
  // Minimal markdown: bold, italics, code, newlines
  return escHtml(text)
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`(.*?)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br>');
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}

function askSuggestion(btn) {
  document.getElementById("user-input").value = btn.textContent;
  sendMessage();
}
</script>
</body>
</html>
